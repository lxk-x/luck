<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星座运势 - 每日卜算</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --gold: #f5a623;
      --dark-bg: #0a0a1a;
      --card-bg: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1a3e 50%, #0a0a1a 100%);
      min-height: 100vh;
      color: #fff;
      position: relative;
      overflow-x: hidden;
    }

    .stars-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.5;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 300;
      background: linear-gradient(135deg, #667eea 0%, #f5a623 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      letter-spacing: 8px;
    }

    .header p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }

    .date-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      padding: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .date-bar .icon {
      font-size: 20px;
    }

    .date-bar .text {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
    }

    .date-bar .value {
      font-size: 18px;
      font-weight: 600;
      color: var(--gold);
    }

    .selection-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .selection-title {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 20px;
    }

    .zodiac-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      max-width: 600px;
      margin: 0 auto;
    }

    .zodiac-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 8px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: rgba(255, 255, 255, 0.8);
    }

    .zodiac-btn:hover,
    .zodiac-btn.active {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%);
      border-color: var(--primary);
      transform: translateY(-2px);
    }

    .zodiac-btn .emoji {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .zodiac-btn .name {
      font-size: 12px;
    }

    .result-section {
      display: none;
    }

    .result-section.show {
      display: block;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .main-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .main-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--gold), var(--secondary));
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .zodiac-large {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
    }

    .header-info {
      flex: 1;
    }

    .zodiac-name {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .zodiac-date {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
    }

    .luck-overview {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
    }

    .luck-item {
      flex: 1;
      text-align: center;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
    }

    .luck-item .icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .luck-item .label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 8px;
    }

    .luck-item .bar-container {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .luck-item .bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s ease;
    }

    .bar.love { background: linear-gradient(90deg, #f5576c, #f093fb); }
    .bar.career { background: linear-gradient(90deg, #4facfe, #00f2fe); }
    .bar.health { background: linear-gradient(90deg, #43e97b, #38f9d7); }
    .bar.money { background: linear-gradient(90deg, #fa709a, #fee140); }

    .reading-section {
      margin-top: 24px;
    }

    .reading-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .reading-text {
      font-size: 15px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.9);
      text-indent: 2em;
    }

    .hexagram-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .hexagram-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .hexagram-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .hexagram-symbol {
      font-size: 48px;
    }

    .hexagram-text {
      font-size: 18px;
      font-weight: 600;
    }

    .hexagram-change {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .hexagram-meaning {
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.8);
    }

    .tips-card {
      background: linear-gradient(135deg, rgba(245, 166, 35, 0.1) 0%, rgba(102, 126, 234, 0.1) 100%);
      border: 1px solid rgba(245, 166, 35, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .tips-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tips-list {
      list-style: none;
    }

    .tips-list li {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      padding: 6px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tips-list li::before {
      content: '✦';
      color: var(--gold);
      font-size: 12px;
    }

    .footer {
      text-align: center;
      padding-top: 40px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    .footer p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
    }

    .refresh-btn {
      display: block;
      margin: 24px auto;
      padding: 12px 32px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      border-radius: 30px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
    }

    @media (max-width: 600px) {
      .zodiac-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      .luck-overview {
        flex-direction: column;
      }

      .header h1 {
        font-size: 24px;
      }

      .card-header {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>

    const tips = {
      luckyColors: ['红色', '橙色', '黄色', '绿色', '青色', '蓝色', '紫色', '粉色', '金色', '银色', '白色', '黑色'],
      luckyNumbers: ['1', '2', '3', '5', '6', '7', '8', '9'],
      luckyDirections: ['东', '南', '西', '北', '东南', '西南', '东北', '西北'],
      taboos: ['避免冲动决策', '不宜与人争执', '注意言行举止', '避免大额投资', '不宜远行', '注意休息']
    };

    function generateStars() {
      const bg = document.getElementById('starsBg');
      for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.width = (Math.random() * 2 + 1) + 'px';
        star.style.height = star.style.width;
        bg.appendChild(star);
      }
    }

    function getTodayInfo() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const day = now.getDate();
      const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
      const weekDay = weekDays[now.getDay()];
      
      document.getElementById('currentDate').textContent = `${year}年${month}月${day}日 周${weekDay}`;
      
      const lunar = getLunarDate(now);
      document.getElementById('lunarDate').textContent = lunar;
      
      const dayOfYear = getDayOfYear(now);
      const hexIndex = dayOfYear % hexagrams.length;
      document.getElementById('todayHexagram').textContent = hexagrams[hexIndex].symbol;
      
      return { dayOfYear, hexIndex };
    }

    function getDayOfYear(date) {
      const start = new Date(date.getFullYear(), 0, 0);
      const diff = date - start;
      const oneDay = 1000 * 60 * 60 * 24;
      return Math.floor(diff / oneDay);
    }

    function getLunarDate(date) {
      const lunarMonths = ['正', '二', '三', '四', '五', '六', '七', '八', '九', '十', '冬', '腊'];
      const lunarDays = ['', '初一', '初二', '初三', '初四', '初五', '初六', '初七', '初八', '初九', '初十',
        '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十',
        '廿一', '廿二', '廿三', '廿四', '廿五', '廿六', '廿七', '廿八', '廿九', '三十'];
      
      const monthIndex = (date.getMonth() + 1) % 12;
      const dayIndex = Math.min(date.getDate(), 30);
      return `庚子年${lunarMonths[monthIndex]}月${lunarDays[dayIndex]}`;
    }

    function renderZodiacGrid() {
      const grid = document.getElementById('zodiacGrid');
      zodiacs.forEach(z => {
        const btn = document.createElement('div');
        btn.className = 'zodiac-btn';
        btn.innerHTML = `<span class="emoji">${z.emoji}</span><span class="name">${z.name}</span>`;
        btn.onclick = () => selectZodiac(z);
        grid.appendChild(btn);
      });
    }

    function selectZodiac(zodiac) {
      document.querySelectorAll('.zodiac-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      
      const { dayOfYear } = getTodayInfo();
      generateReading(zodiac, dayOfYear);
      
      document.getElementById('resultSection').classList.add('show');
    }

    function generateReading(zodiac, seed) {
      const random = seededRandom(seed + zodiac.name.charCodeAt(0));
      
      document.getElementById('zodiacLarge').textContent = zodiac.emoji;
      document.getElementById('zodiacName').textContent = zodiac.name;
      document.getElementById('zodiacDate').textContent = `${zodiac.date} | 守护星：${zodiac.ruling} | 元素：${zodiac.element}`;
      
      const lovePercent = Math.floor(random() * 40 + 50);
      const careerPercent = Math.floor(random() * 40 + 50);
      const healthPercent = Math.floor(random() * 40 + 50);
      const moneyPercent = Math.floor(random() * 40 + 50);
      
      animateBar('loveBar', lovePercent);
      animateBar('careerBar', careerPercent);
      animateBar('healthBar', healthPercent);
      animateBar('moneyBar', moneyPercent);
      
      const readingText = readings[zodiac.name];
      let fullReading = '';
      const keys = ['love', 'career', 'health', 'money'];
      keys.forEach(key => {
        const texts = readingText[key];
        const index = Math.floor(random() * texts.length);
        fullReading += texts[index] + ' ';
      });
      document.getElementById('readingText').textContent = fullReading;
      
      const hexIndex = Math.floor(random() * hexagrams.length);
      const hex = hexagrams[hexIndex];
      document.getElementById('hexagramSymbol').textContent = hex.symbol;
      document.getElementById('hexagramText').textContent = hex.name;
      document.getElementById('hexagramChange').textContent = hex.change;
      document.getElementById('hexagramMeaning').textContent = hex.meaning;
      
      generateTips(random);
    }

    function seededRandom(seed) {
      return function() {
        seed = (seed * 9301 + 49297) % 233280;
        return seed / 233280;
      };
    }

    function animateBar(id, percent) {
      const bar = document.getElementById(id);
      bar.style.width = '0%';
      setTimeout(() => {
        bar.style.width = percent + '%';
      }, 100);
    }

    function generateTips(random) {
      const color = tips.luckyColors[Math.floor(random() * tips.luckyColors.length)];
      const number = tips.luckyNumbers[Math.floor(random() * tips.luckyNumbers.length)];
      const direction = tips.luckyDirections[Math.floor(random() * tips.luckyDirections.length)];
      const taboo = tips.taboos[Math.floor(random() * tips.taboos.length)];
      
      const tipsList = document.getElementById('tipsList');
      tipsList.innerHTML = `
        <li>幸运色：${color}</li>
        <li>幸运数字：${number}</li>
        <li>幸运方位：${direction}</li>
        <li>今日注意：${taboo}</li>
      `;
    }

    function refreshReading() {
      const activeBtn = document.querySelector('.zodiac-btn.active');
      if (activeBtn) {
        const emoji = activeBtn.querySelector('.emoji').textContent;
        const zodiac = zodiacs.find(z => z.emoji === emoji);
        const { dayOfYear } = getTodayInfo();
        generateReading(zodiac, dayOfYear + Math.random());
      }
    }

    generateStars();
    getTodayInfo();
    renderZodiacGrid();
  </script>
